<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>23birthday</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(180deg,#79d8ff,#3d82d6,#0f3c74);
min-height:100vh;
overflow-x:hidden;
color:white;

}

/* 波 */

.wave{
position:fixed;
left:0;
bottom:0;
width:200%;
height:180px;
background:rgba(255,255,255,.18);
border-radius:45%;
animation:wave 14s linear infinite;
}

.wave2{
position:fixed;
left:0;
bottom:-30px;
width:220%;
height:210px;
background:rgba(255,255,255,.08);
border-radius:45%;
animation:wave 22s linear infinite reverse;
}

@keyframes wave{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

.container{

width:92%;
max-width:420px;
margin:auto;
padding:30px 0 120px;

}

/* タイトル */

.hero{

margin-top:35px;
text-align:center;

}

.hero h1{

font-size:42px;
font-weight:700;
letter-spacing:3px;

}

.hero h2{

margin-top:10px;
font-size:26px;
font-weight:300;

}

.hero p{

margin-top:25px;
font-size:17px;
line-height:1.8;
color:#eef8ff;

}

/* ガラスカード */

.card{

margin-top:35px;

background:rgba(255,255,255,.16);

backdrop-filter:blur(14px);

border:1px solid rgba(255,255,255,.25);

border-radius:28px;

padding:25px;

box-shadow:0 10px 35px rgba(0,0,0,.2);

}

.card h3{

text-align:center;

font-size:25px;

margin-bottom:20px;

}

/* スケジュール */

.item{

display:flex;

justify-content:space-between;

margin:16px 0;

font-size:16px;

padding-bottom:12px;

border-bottom:1px solid rgba(255,255,255,.15);

}

.time{

font-weight:600;

}

.secret{

color:#ffe89e;

}

/* ボタン */

.start{

margin-top:35px;

width:100%;

padding:18px;

border:none;

border-radius:40px;

font-size:18px;

background:white;

color:#2196f3;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.start:hover{

transform:scale(1.03);

}

/* フッター */

.footer{

margin-top:40px;

text-align:center;

opacity:.8;

font-size:14px;

}

</style>

</head>

<body>

<div class="wave"></div>

<div class="wave2"></div>

<div class="container">

<div class="hero">

<h1>23birthday</h1>

<h2>Welcome, Shumma 🌊</h2>

<p>

今日は君のためだけに用意した

特別な旅。

このしおりには

まだ秘密が隠されています。

</p>

</div>

<div class="card">

<h3>DAY 1</h3>

<div class="item">
<span class="time">11:00</span>
<span>🍔 Lunch <span class="secret">🔒 Secret</span></span>
</div>

<div class="item">
<span class="time"></span>
<span>🛒 買い出し</span>
</div>

<div class="item">
<span class="time"></span>
<span>🥩 Secret Mission <span class="secret">🔒</span></span>
</div>

<div class="item">
<span class="time"></span>
<span>🎂 Cake</span>
</div>

<div class="item">
<span class="time">15:00</span>
<span>🏨 Check In</span>
</div>

<div class="item">
<span class="time">16:00</span>
<span>🚤 Activity <span class="secret">🔒 Secret</span></span>
</div>

<div class="item">
<span class="time"></span>
<span>🛍 うらりマルシェ</span>
</div>

<div class="item">
<span class="time"></span>
<span>🌊 城ヶ島</span>
</div>

<div class="item">
<span class="time"></span>
<span>🍳 Dinner</span>
</div>

</div>

<div class="card">

<h3>DAY 2</h3>

<div class="item">
<span class="time">11:30</span>
<span>🍣 Lunch <span class="secret">🔒 Secret</span></span>
</div>

<div class="item">
<span class="time">13:00</span>
<span>🏄 SUP</span>
</div>

<div class="item">
<span class="time"></span>
<span>♨ 温泉</span>
</div>

<div class="item">
<span class="time"></span>
<span>🌙 Dinner</span>
</div>

</div>

<button class="start">

START JOURNEY

</button>

<div class="footer">

Made with ❤️ for Shumma

</div>

</div>

</body>
</html>
